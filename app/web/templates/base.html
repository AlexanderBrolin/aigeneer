<!DOCTYPE html>
<html lang="ru" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ops-agent{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="h-full" x-data="{ sidebarOpen: true }">
    <div class="flex h-full">
        <!-- Sidebar -->
        <aside class="bg-blue-800 text-white transition-all duration-300"
               :class="sidebarOpen ? 'w-64' : 'w-16'">
            <div class="p-4 flex items-center justify-between">
                <span class="text-lg font-bold" x-show="sidebarOpen">ops-agent</span>
                <button @click="sidebarOpen = !sidebarOpen" class="text-blue-200 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
            <nav class="mt-4">
                <a href="/dashboard" class="flex items-center px-4 py-3 text-blue-100 hover:bg-blue-700 hover:text-white {{ 'bg-blue-700' if active_page == 'dashboard' else '' }}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    <span class="ml-3" x-show="sidebarOpen">Dashboard</span>
                </a>
                <a href="/servers" class="flex items-center px-4 py-3 text-blue-100 hover:bg-blue-700 hover:text-white {{ 'bg-blue-700' if active_page == 'servers' else '' }}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2"/></svg>
                    <span class="ml-3" x-show="sidebarOpen">Серверы</span>
                </a>
                <a href="/incidents" class="flex items-center px-4 py-3 text-blue-100 hover:bg-blue-700 hover:text-white {{ 'bg-blue-700' if active_page == 'incidents' else '' }}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.834-1.964-.834-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                    <span class="ml-3" x-show="sidebarOpen">Инциденты</span>
                </a>
                <a href="/check-runs" class="flex items-center px-4 py-3 text-blue-100 hover:bg-blue-700 hover:text-white {{ 'bg-blue-700' if active_page == 'check_runs' else '' }}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                    <span class="ml-3" x-show="sidebarOpen">Проверки</span>
                </a>
                <a href="/recommendations" class="flex items-center px-4 py-3 text-blue-100 hover:bg-blue-700 hover:text-white {{ 'bg-blue-700' if active_page == 'recommendations' else '' }}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                    <span class="ml-3" x-show="sidebarOpen">AI Советы</span>
                </a>
            </nav>
        </aside>

        <!-- Main content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="bg-white shadow-sm border-b border-gray-200">
                <div class="flex items-center justify-between px-6 py-4">
                    <h1 class="text-xl font-semibold text-gray-800">{% block page_title %}{% endblock %}</h1>
                    <div class="flex items-center gap-4">
                        <span class="text-sm text-gray-500">{{ request.session.get('username', '') }}</span>
                        <a href="/logout" class="text-sm text-red-600 hover:text-red-800">Выход</a>
                    </div>
                </div>
            </header>

            <!-- Flash messages via query param -->
            {% if request.query_params.get('msg') %}
            <div class="px-6 pt-4">
                <div class="mb-2 p-3 rounded-lg text-sm bg-green-50 text-green-700 border border-green-200">
                    {{ request.query_params.get('msg') }}
                </div>
            </div>
            {% endif %}

            <!-- Page content -->
            <main class="flex-1 overflow-y-auto p-6">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
